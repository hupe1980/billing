# cargo-deny configuration
# Docs: https://embarkstudios.github.io/cargo-deny/

# ── Graph configuration ──────────────────────────────────────────────────────
[graph]
targets = []          # check all targets
all-features = false  # check default features; CI runs --all-features separately

# ── Security advisories ──────────────────────────────────────────────────────
[advisories]
# Reject crates with known security vulnerabilities (RustSec advisory-db).
version = 2
ignore = []

# ── License policy ───────────────────────────────────────────────────────────
[licenses]
version = 2
# Only allow OSI-approved permissive licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name    = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ── Dependency bans ──────────────────────────────────────────────────────────
[bans]
# Warn (not error) on duplicate versions; different semver-majors are common.
multiple-versions = "warn"
wildcards         = "allow"
highlight         = "all"
deny              = []

# ── Crate source policy ──────────────────────────────────────────────────────
[sources]
unknown-registry = "warn"
unknown-git      = "warn"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
